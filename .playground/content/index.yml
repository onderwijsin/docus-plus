seo:
  title: Example Docs
  description: A small example documentation site built with the Docus Plus layer.
  ogImage: https://placehold.co/1200x630/png?text=Example+Docs
hero:
  headline: Docus Plus playground
  title: Build a helpful documentation site
  description: Explore a small, practical example of the content, navigation, and UI patterns provided by the Docus Plus layer.
  links:
    - label: Get started
      to: /getting-started
      color: primary
      size: xl
      trailingIcon: i-lucide-arrow-right
    - label: Browse the guides
      to: /guides/working-with-content
      color: neutral
      variant: outline
      icon: i-lucide-book-open
features:
  headline: A useful starting point
  title: Keep the first version focused.
  description: Start with a clear structure, then add the integrations and components your project needs.
  items:
    - icon: i-lucide-file-text
      title: Write in Markdown
      description: Keep guides close to the project and use frontmatter for titles, descriptions, and navigation metadata.
    - icon: i-lucide-palette
      title: Make it yours
      description: Configure your identity, colors, typography, and logo from the consuming application.
    - icon: i-lucide-layers
      title: Extend the layer
      description: Add pages and app behavior without changing the reusable Docus Plus foundation.
cta:
  title: Start with the example
  description: Read the getting-started guide to see how a small documentation project can grow from here.
  links:
    - label: Read the guide
      to: /getting-started
      color: primary
      size: xl
      trailingIcon: i-lucide-arrow-right
